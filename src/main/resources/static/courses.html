<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程列表 - 课堂投票系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="header">
  <h1>📊 课堂投票系统</h1>
  <span class="user-info" id="user-info"></span>
  <button onclick="logout()">退出登录</button>
</div>

<div class="nav-tabs">
  <a href="/courses.html" class="active">课程列表</a>
  <a href="javascript:void(0)" onclick="goStats()">数据统计</a>
</div>

<div class="container">
  <div id="toolbar" style="margin-bottom:1rem"></div>
  <div id="course-list"></div>

  <!-- 创建课程/加入课程弹窗 -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-content"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const user = JSON.parse(sessionStorage.getItem('cvs_user'));
  if (!user) { window.location.href = '/login.html'; }

  document.getElementById('user-info').textContent =
    `${user.realName} (${user.role === 'TEACHER' ? '教师' : '学生'}) | ID: ${user.id}`;

  function logout() { sessionStorage.clear(); window.location.href = '/login.html'; }

  function goStats() {
    if (user.role === 'TEACHER') {
      window.location.href = '/statistics.html';
    } else {
      window.location.href = '/courses.html';
    }
  }

  async function loadCourses() {
    try {
      const res = await API.getCourses(user.id, user.role);
      const list = document.getElementById('course-list');
      const toolbar = document.getElementById('toolbar');

      if (user.role === 'TEACHER') {
        toolbar.innerHTML = '<button class="btn btn-primary" onclick="showCreateModal()">+ 创建课程</button>';
      } else {
        toolbar.innerHTML = '<button class="btn btn-outline" onclick="showEnrollModal()">+ 加入课程</button>';
      }

      if (!res.data || res.data.length === 0) {
        list.innerHTML = '<div class="card" style="text-align:center;color:var(--text-light)">暂无课程</div>';
        return;
      }

      list.innerHTML = res.data.map(c => `
        <div class="list-item">
          <div>
            <strong>${escHtml(c.name)}</strong>
            <div style="font-size:0.85rem;color:var(--text-light)">
              ${escHtml(c.description || '')} | 教师: ${escHtml(c.teacherName)}
            </div>
          </div>
          <div style="display:flex;gap:0.5rem">
            <button class="btn btn-outline btn-sm" onclick="goDetail(${c.id})">进入</button>
            ${user.role === 'TEACHER' && c.teacherId === user.id ? 
              `<button class="btn btn-danger btn-sm" onclick="deleteCourse(${c.id})">删除</button>` : ''}
          </div>
        </div>
      `).join('');
    } catch (err) {
      alert(err.message);
    }
  }

  function goDetail(courseId) {
    sessionStorage.setItem('cvs_courseId', courseId);
    window.location.href = '/course-detail.html';
  }

  async function deleteCourse(courseId) {
    if (!confirm('确定删除该课程？将同时删除所有知识点和投票数据。')) return;
    try {
      await API.deleteCourse(courseId, user.id);
      loadCourses();
    } catch (err) { alert(err.message); }
  }

  function showCreateModal() {
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.getElementById('modal-content').innerHTML = `
      <h3>创建新课程</h3>
      <div class="form-group"><label>课程名称</label><input id="c-name" placeholder="输入课程名称"></div>
      <div class="form-group"><label>课程描述</label><textarea id="c-desc" rows="2" placeholder="课程描述（可选）"></textarea></div>
      <div style="display:flex;gap:0.5rem;justify-content:flex-end">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">取消</button>
        <button class="btn btn-primary btn-sm" onclick="createCourse()">创建</button>
      </div>
    `;
  }

  function showEnrollModal() {
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.getElementById('modal-content').innerHTML = `
      <h3>加入课程</h3>
      <div class="form-group"><label>课程ID</label><input id="e-courseId" type="number" placeholder="输入课程ID"></div>
      <div style="display:flex;gap:0.5rem;justify-content:flex-end">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">取消</button>
        <button class="btn btn-primary btn-sm" onclick="enrollCourse()">加入</button>
      </div>
    `;
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
  }

  async function createCourse() {
    const name = document.getElementById('c-name').value.trim();
    const description = document.getElementById('c-desc').value.trim();
    if (!name) return alert('请输入课程名称');
    try {
      await API.createCourse({ teacherId: user.id, name, description });
      closeModal();
      loadCourses();
    } catch (err) { alert(err.message); }
  }

  async function enrollCourse() {
    const courseId = parseInt(document.getElementById('e-courseId').value);
    if (!courseId) return alert('请输入课程ID');
    try {
      await API.enrollCourse(courseId, user.id);
      closeModal();
      loadCourses();
    } catch (err) { alert(err.message); }
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  loadCourses();
</script>
</body>
</html>
