<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 课堂投票系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <h2>📊 课堂投票系统</h2>
    <p class="subtitle">Classroom Vote System</p>

    <!-- 登录表单 -->
    <form id="login-form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="输入用户名" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">登 录</button>
    </form>

    <!-- 注册表单 -->
    <form id="register-form" class="hidden">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="reg-username" placeholder="输入用户名" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="reg-password" placeholder="输入密码" required>
      </div>
      <div class="form-group">
        <label>真实姓名</label>
        <input type="text" id="reg-realname" placeholder="输入真实姓名" required>
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="reg-role" required>
          <option value="">请选择角色</option>
          <option value="STUDENT">学生</option>
          <option value="TEACHER">教师</option>
        </select>
      </div>
      <button type="submit" class="btn btn-success" style="width:100%">注 册</button>
    </form>

    <p class="toggle-link" id="toggle-link">没有账号？立即注册</p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  let isLogin = true;

  document.getElementById('toggle-link').addEventListener('click', () => {
    isLogin = !isLogin;
    document.getElementById('login-form').classList.toggle('hidden', !isLogin);
    document.getElementById('register-form').classList.toggle('hidden', isLogin);
    document.getElementById('toggle-link').textContent = isLogin ? '没有账号？立即注册' : '已有账号？立即登录';
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();
    if (!username || !password) return alert('请填写完整');

    try {
      const res = await API.login({ username, password });
      sessionStorage.setItem('cvs_user', JSON.stringify(res.data));
      window.location.href = '/courses.html';
    } catch (err) {
      alert(err.message);
    }
  });

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value.trim();
    const realName = document.getElementById('reg-realname').value.trim();
    const role = document.getElementById('reg-role').value;
    if (!username || !password || !realName || !role) return alert('请填写完整');

    try {
      const res = await API.register({ username, password, realName, role });
      sessionStorage.setItem('cvs_user', JSON.stringify(res.data));
      window.location.href = '/courses.html';
    } catch (err) {
      alert(err.message);
    }
  });
</script>
</body>
</html>
