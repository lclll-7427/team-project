server:
  port: 8080

spring:
  application:
    name: classroom-vote-system

  # H2 内嵌数据库 (开发/演示)
  datasource:
    url: jdbc:h2:mem:cvsdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Web Console (开发调试用)
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true

  # 初始化数据
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
