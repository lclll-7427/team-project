# GitHub Actions CI 工作流 - Spring Boot Maven 项目
# 触发条件: push 或 PR 到 main 分支
# 功能: Maven 编译 → 运行测试 → 打包 JAR → 上传产物

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Maven 构建与测试
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 📥 检出代码
        uses: actions/checkout@v4

      # 2. 配置 JDK 21
      - name: ☕ 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      # 3. Maven 编译 + 测试
      - name: 🔨 编译与测试
        run: mvn clean test --batch-mode

      # 4. 打包 JAR
      - name: 📦 打包
        run: mvn package -DskipTests --batch-mode

      # 5. 上传 JAR 产物
      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: cvs-app
          path: target/cvs-app.jar
          retention-days: 7
