# GitHub Actions 自动部署工作流
# 触发条件: push 到 main 分支
# 功能: 构建 Spring Boot JAR → 上传为部署产物

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: 构建并部署
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 📥 检出代码
        uses: actions/checkout@v4

      # 2. 配置 JDK 21
      - name: ☕ 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      # 3. 运行测试
      - name: 🧪 运行测试
        run: mvn test --batch-mode

      # 4. 打包
      - name: 📦 打包 JAR
        run: mvn package -DskipTests --batch-mode

      # 5. 上传部署产物 (保留 30 天)
      - name: 📤 上传部署产物
        uses: actions/upload-artifact@v4
        with:
          name: cvs-app-deploy
          path: target/cvs-app.jar
          retention-days: 30
